<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pitch Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; touch-action: manipulation; }
        .teams { margin-bottom: 20px; }
        .row-input { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
        input[type="text"] { padding: 10px; width: 60%; }
        input[type="number"] { padding: 10px; width: 20%; text-align: center; }
        .stats { font-size: 20px; margin: 8px 0; font-weight: bold; }
        .button-container { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 25px; font-size: 20px; border: none; border-radius: 8px; color: white; width: 100%; }
        .row { display: flex; gap: 10px; margin-top: 15px; }
        .row button { padding: 15px; font-size: 16px; flex: 1; }
        #strikeBtn { background-color: #d9534f; } 
        #ballBtn { background-color: #5cb85c; }   
        #hitBtn { background-color: #f0ad4e; }
        #inningBtn { background-color: #5bc0de; }
        #analyzeBtn { background-color: #f77f00; }
        #exportBtn { background-color: #007bff; }
        #resetBtn { background-color: #333; }
    </style>
</head>
<body>
    <h3>Pitch Tracker</h3>
    <div class="teams">
        <div class="row-input">
            <input type="text" id="homeTeam" placeholder="Home Team" oninput="saveData()">
            <input type="number" id="homeScore" placeholder="0" oninput="saveData()">
        </div>
        <div class="row-input">
            <input type="text" id="awayTeam" placeholder="Away Team" oninput="saveData()">
            <input type="number" id="awayScore" placeholder="0" oninput="saveData()">
        </div>
    </div>

    <div class="stats">Current: S:<span id="s">0</span> | B:<span id="b">0</span></div>
    <div class="stats">Total: S:<span id="ts">0</span> | B:<span id="tb">0</span></div>
    <div class="stats">Hits: <span id="h">0</span> | IP: <span id="ip">0.0</span></div>
    
    <div class="button-container">
        <button id="strikeBtn" onclick="add('s')">STRIKE</button>
        <button id="ballBtn" onclick="add('b')">BALL</button>
        <button id="hitBtn" onclick="add('h')">HIT</button>
        <button id="inningBtn" onclick="add('ip')">+1/3 Inning</button>
    </div>

    <p>SO: <span id="so">0</span> | BB: <span id="bb">0</span></p>
    
    <div class="row">
        <button id="analyzeBtn" onclick="openStats()">View Game Stats</button>
    </div>
    <div class="row">
        <button id="exportBtn" onclick="exportData()">Export</button>
        <button id="resetBtn" onclick="reset()">Reset</button>
    </div>

    <!-- Stats Modal -->
    <div id="statsModal" style="display:none; position:fixed; top:10%; left:5%; width:90%; background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.5); z-index:100; border: 1px solid #ccc;">
        <h3>Game Stats</h3>
        <div id="statsContent" style="text-align: left; font-size: 16px;"></div>
        <button onclick="document.getElementById('statsModal').style.display='none'" style="margin-top:20px; padding:10px; width:100%; background-color:#555;">Close</button>
    </div>

    <script>
        let s=0, b=0, ts=0, tb=0, h=0, ip=0, so=0, bb=0;
        
        function loadData() {
            s=parseInt(localStorage.getItem('s'))||0; b=parseInt(localStorage.getItem('b'))||0;
            ts=parseInt(localStorage.getItem('ts'))||0; tb=parseInt(localStorage.getItem('tb'))||0;
            h=parseInt(localStorage.getItem('h'))||0; ip=parseFloat(localStorage.getItem('ip'))||0;
            so=parseInt(localStorage.getItem('so'))||0; bb=parseInt(localStorage.getItem('bb'))||0;
            document.getElementById('homeTeam').value = localStorage.getItem('homeTeam')||'';
            document.getElementById('homeScore').value = localStorage.getItem('homeScore')||'';
            document.getElementById('awayTeam').value = localStorage.getItem('awayTeam')||'';
            document.getElementById('awayScore').value = localStorage.getItem('awayScore')||'';
            updateUI();
        }

        function updateUI() {
            document.getElementById('s').innerText=s; document.getElementById('b').innerText=b;
            document.getElementById('ts').innerText=ts; document.getElementById('tb').innerText=tb;
            document.getElementById('h').innerText=h; document.getElementById('ip').innerText=ip.toFixed(1);
            document.getElementById('so').innerText=so; document.getElementById('bb').innerText=bb;
            saveData();
        }

        function saveData() {
            localStorage.setItem('s',s); localStorage.setItem('b',b); localStorage.setItem('ts',ts);
            localStorage.setItem('tb',tb); localStorage.setItem('h',h); localStorage.setItem('ip',ip);
            localStorage.setItem('so',so); localStorage.setItem('bb',bb);
            localStorage.setItem('homeTeam', document.getElementById('homeTeam').value);
            localStorage.setItem('homeScore', document.getElementById('homeScore').value);
            localStorage.setItem('awayTeam', document.getElementById('awayTeam').value);
            localStorage.setItem('awayScore', document.getElementById('awayScore').value);
        }

        function add(type) {
            if(type=='s'){s++; ts++; if(s>=3){so++; s=0; b=0;}}
            else if(type=='b'){b++; tb++; if(b>=4){bb++; s=0; b=0;}}
            else if(type=='h'){h++; s=0; b=0;}
            else if(type=='ip'){ip+=0.33;}
            updateUI();
        }

        function openStats() {
            let totalPitches = ts + tb;
            let strikePct = totalPitches > 0 ? ((ts / totalPitches) * 100).toFixed(1) : "0.0";
            let content = `<p>Total pitches: ${totalPitches}</p>
                           <p>Strike %: ${strikePct}%</p>
                           <p>Strikeouts: ${so}</p>
                           <p>Walks: ${bb}</p>
                           <p>Hits: ${h}</p>
                           <p>IP: ${ip.toFixed(1)}</p>`;
            document.getElementById('statsContent').innerHTML = content;
            document.getElementById('statsModal').style.display = 'block';
        }

        function reset() { 
            if(confirm("Reset all statistics?")) { localStorage.clear(); location.reload(); } 
        }

        function exportData() {
            const data=[
                ["Teams", document.getElementById('homeTeam').value + " vs " + document.getElementById('awayTeam').value],
                ["Score", document.getElementById('homeScore').value + " - " + document.getElementById('awayScore').value],
                ["Strikes", ts], ["Balls", tb], ["Hits", h], ["Innings", ip.toFixed(1)], ["SO", so], ["BB", bb]
            ];
            let csv="data:text/csv;charset=utf-8,"+data.map(e=>e.join(",")).join("\n");
            const link=document.createElement("a"); link.setAttribute("href",encodeURI(csv));
            link.setAttribute("download","pitch_data.csv"); document.body.appendChild(link);
            link.click(); document.body.removeChild(link);
        }

        loadData();
    </script>
</body>
</html>
